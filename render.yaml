services:
  - type: web
    name: radha-sawarkar-portfolio
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 22
    # React Router handles routing client-side — every path must
    # resolve to index.html, or refreshing a route like /projects
    # directly returns a 404 instead of the app.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
