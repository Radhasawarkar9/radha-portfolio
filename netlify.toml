[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# ── Serverless Functions ──────────────────────────────────────────────────────
# contact.mjs  →  POST /.netlify/functions/contact
# esbuild bundles each function for fast cold starts and ESM compatibility.
[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback — React Router handles routing client-side, so every
# path must resolve to index.html. Netlify evaluates /.netlify/functions/*
# before this catch-all, so the function route is never swallowed.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Long-cache the hashed, immutable assets Vite outputs into dist/assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
